<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farms Guide - Minecraft Java</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2c2c2c;
            --card-bg: #8b6914;
            --primary: #5D8C3E;
            --text-color: #e0e0e0;
            --inner-bg: #1a1a1a;
            --mc-btn: #8B8B8B;
            --mc-btn-top: #C6C6C6;
            --mc-btn-bottom: #555555;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            background-image: url('https://www.transparenttextures.com/patterns/stone.png');
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            color: #fff;
            background: linear-gradient(to bottom, #5D8C3E 50%, #8B5E3C 50%);
            padding: 20px;
            border: 4px solid #000;
            box-shadow: inset -2px -4px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.1);
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 20px;
        }
        .subtitle {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            color: #aaa;
            font-size: 10px;
            margin-bottom: 20px;
        }
        
        /* Category Buttons */
        #categoryFilters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .cat-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 8px 12px;
            background-color: var(--mc-btn);
            border: 2px solid;
            border-color: var(--mc-btn-top) var(--mc-btn-bottom) var(--mc-btn-bottom) var(--mc-btn-top);
            color: #fff;
            text-shadow: 1px 1px 0 #3b3b3b;
            cursor: pointer;
            outline: none;
        }
        .cat-btn:active, .cat-btn.active {
            border-color: var(--mc-btn-bottom) var(--mc-btn-top) var(--mc-btn-top) var(--mc-btn-bottom);
            background-color: #7a7a7a;
        }

        #searchBox {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 4px solid #000;
            background-color: #555;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            box-sizing: border-box;
            box-shadow: inset 2px 2px 0 rgba(0,0,0,0.5);
        }
        #searchBox::placeholder { color: #ccc; }

        .farm-card {
            background-color: var(--card-bg);
            padding: 0;
            margin-bottom: 20px;
            border: 4px solid #000;
            box-shadow: inset -2px -4px 0 rgba(0,0,0,0.4), inset 2px 2px 0 rgba(255,255,255,0.2);
        }
        .farm-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            cursor: pointer;
        }
        .farm-title-area { display: flex; flex-direction: column; gap: 5px; }
        .farm-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
            margin: 0;
        }
        .version-badge {
            background-color: #1a1a1a;
            color: #4CAF50;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            padding: 4px 6px;
            border: 1px solid #4CAF50;
            display: inline-block;
            width: fit-content;
        }
        .farm-difficulty {
            font-size: 12px;
            color: #ffeb3b;
            text-shadow: 1px 1px 0px #000;
        }
        
        .farm-details {
            display: none;
            background-color: var(--inner-bg);
            border-top: 4px solid #000;
            padding: 15px;
        }
        .resources-box {
            background-color: #c6a665;
            border: 3px solid #000;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: inset 2px 2px 0 rgba(255,255,255,0.3);
            position: relative;
        }
        .resources-box h3 {
            font-family: 'Press Start 2P', cursive;
            color: #3b2a08;
            font-size: 12px;
            margin-top: 0;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* Copy Button */
        .copy-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            background: #5D8C3E;
            border: 2px solid #000;
            color: #fff;
            padding: 4px 8px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
        }
        .copy-btn:active { transform: translate(1px, 1px); }

        /* Checklist */
        .resource-list {
            list-style-type: none;
            padding: 0;
        }
        .resource-list li {
            display: flex;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px dashed #555;
            font-size: 14px;
            color: #000;
            font-weight: bold;
            gap: 8px;
        }
        .resource-list li input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #5D8C3E;
            cursor: pointer;
        }
        .resource-list li.checked-item .res-text {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .res-icon { font-size: 18px; }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #333;
            border: 2px solid #000;
            margin-top: 10px;
            height: 12px;
        }
        .progress-bar {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }

        .steps-box h3 {
            font-family: 'Press Start 2P', cursive;
            color: var(--primary);
            font-size: 12px;
            text-shadow: 2px 2px 0px #000;
        }
        .step {
            background-color: #222;
            padding: 10px;
            margin-bottom: 8px;
            border-right: 4px solid var(--primary);
            border: 2px solid #444;
            font-size: 14px;
            line-height: 1.6;
        }
        .step strong { color: #fff; }
    </style>
</head>

        let currentCategory = "all";

        function filterByCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === getCategoryArabic(category) || (category === 'all' && btn.innerText === 'الكل')) {
                    btn.classList.add('active');
                }
            });
            renderFarms();
        }

        function getCategoryArabic(cat) {
            switch(cat) {
                case 'Mobs': return 'وحوش';
                case 'Crops': return 'زراعة';
                case 'Blocks': return 'بلوكات';
                case 'XP': return 'إكس بي';
                default: return 'الكل';
            }
        }

        function renderFarms() {
            const container = document.getElementById("farmsContainer");
            const searchVal = document.getElementById("searchBox").value.toLowerCase();
            container.innerHTML = "";

            const filteredFarms = farmsData.filter(farm => {
                const matchCategory = currentCategory === "all" || farm.category === currentCategory;
                const matchSearch = farm.name.toLowerCase().includes(searchVal) || farm.keywords.includes(searchVal);
                return matchCategory && matchSearch;
            });

            if(filteredFarms.length === 0) {
                container.innerHTML = "<p style='text-align:center; font-family: Press Start 2P; color: #ff5555; margin-top:50px;'>مفيش فارمات بالاسم ده!</p>";
                return;
            }

            filteredFarms.forEach((farm, index) => {
                const card = document.createElement("div");
                card.className = "farm-card";
                
                let resourcesHTML = farm.resources.map((res, resIdx) => `
                    <li id="res-${index}-${resIdx}">
                        <input type="checkbox" onchange="toggleCheck(this, ${index}, ${resIdx})">
                        <span class="res-icon">${res.icon}</span>
                        <span class="res-text">${res.text}</span>
                    </li>
                `).join("");

                let stepsHTML = farm.steps.map((step, i) => `<div class="step"><strong>الخطوة ${i+1}:</strong> ${step}</div>`).join("");

                card.innerHTML = `
                    <div class="farm-header" onclick="toggleDetails(${index})">
                        <div class="farm-title-area">
                            <div class="farm-title">${farm.name}</div>
                            <span class="version-badge">Java ${farm.version}</span>
                        </div>
                        <div class="farm-difficulty">الصعوبة: ${farm.difficulty}</div>
                    </div>
                    <div class="farm-details" id="details-${index}">
                        <div class="resources-box">
                            <h3>
                                📦 الموارد المطلوبة
                                <button class="copy-btn" onclick="copyResources(${index}, event)">📋 نسخ</button>
                            </h3>
                            <div class="progress-container">
                                <div class="progress-bar" id="progress-${index}"></div>
                            </div>
                            <ul class="resource-list">${resourcesHTML}</ul>
                        </div>
                        <div class="steps-box">
                            <h3>🛠️ طريقة البناء:</h3>
                            ${stepsHTML}
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function toggleDetails(index) {
            const details = document.getElementById(`details-${index}`);
            details.style.display = details.style.display === "block" ? "none" : "block";
        }

        function toggleCheck(checkbox, farmIdx, resIdx) {
            const listItem = checkbox.parentElement;
            if (checkbox.checked) {
                listItem.classList.add("checked-item");
            } else {
                listItem.classList.remove("checked-item");
            }
            updateProgress(farmIdx);
        }

        function updateProgress(farmIdx) {
            const farmCard = document.getElementById(`details-${farmIdx}`);
            const totalResources = farmCard.querySelectorAll('.resource-list li').length;
            const checkedResources = farmCard.querySelectorAll('.resource-list li.checked-item').length;
            const progressBar = document.getElementById(`progress-${farmIdx}`);
            
            const percentage = (checkedResources / totalResources) * 100;
            progressBar.style.width = percentage + "%";
            
            if(percentage === 100) {
                progressBar.style.backgroundColor = "#ffeb3b";
            } else {
                progressBar.style.backgroundColor = "#4CAF50";
            }
        }

        // === FIX: The New Copy Function (Works on Local Files) ===
        function copyResources(farmIdx, event) {
            event.stopPropagation(); // Prevent toggling the card
            
            // If the card is closed, open it first
            const details = document.getElementById(`details-${farmIdx}`);
            if(details.style.display !== "block") {
                details.style.display = "block";
            }

            const farm = farmsData[farmIdx];
            let textToCopy = `📦 الموارد لـ ${farm.name} (Java ${farm.version}):\n\n`;
            farm.resources.forEach(res => {
                textToCopy += `- ${res.text}\n`;
            });

            const btn = event.target;

            // Try modern API first, if it fails (due to local file security), use the fallback
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showCopySuccess(btn);
                }).catch(() => {
                    fallbackCopyTextToClipboard(textToCopy, btn);
                });
            } else {
                fallbackCopyTextToClipboard(textToCopy, btn);
            }
        }

        function fallbackCopyTextToClipboard(text, btn) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            
            // Make it invisible and out of the way
            textArea.style.position = "fixed";
            textArea.style.top = "-1000px";
            textArea.style.left = "-1000px";
            textArea.style.opacity = "0";

            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopySuccess(btn);
                } else {
                    btn.innerText = "فشل النسخ ❌";
                    setTimeout(() => { btn.innerText = "📋 نسخ"; }, 2000);
                }
            } catch (err) {
                btn.innerText = "فشل النسخ ❌";
                setTimeout(() => { btn.innerText = "📋 نسخ"; }, 2000);
            }

            document.body.removeChild(textArea);
        }

        function showCopySuccess(btn) {
            btn.innerText = "تم النسخ! ✅";
            setTimeout(() => { btn.innerText = "📋 نسخ"; }, 2000);
        }

        renderFarms();
    </script>
</body>
</html>
