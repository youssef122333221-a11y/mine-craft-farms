        :root {

        body {

            padding: 20px;
        }

        h1 {

            padding: 20px;
            border: 4px solid #000;
            box-shadow: inset -2px -4px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.1);
            text-shadow: 3px 3px 0px #000;

        .cat-btn {

            font-size: 10px;
            padding: 8px 12px;
            background-color: var(--mc-btn);
            border: 2px solid;
            border-color: var(--mc-btn-top) var(--mc-btn-bottom) var(--mc-btn-bottom) var(--mc-btn-top);
            color: #fff;
            text-shadow: 1px 1px 0 #3b3b3b;
            cursor: pointer;
            outline: none;
        }

        .cat-btn:active, .cat-btn.active {
            border-color: var(--mc-btn-bottom) var(--mc-btn-top) var(--mc-btn-top) var(--mc-btn-bottom);
            background-color: #7a7a7a;

            color: white;

        }

            background-color: #555;
            color: white;

        }

            padding: 0;
            margin-bottom: 20px;
            border: 4px solid #000;

            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            cursor: pointer;
            gap: 10px;

            color: #fff;
            text-shadow: 2px 2px 0px #000;

            border: none;
            padding: 0;

        }

        .fav-star.inactive {

        }

            try {

        // ==========================================
        // 3. الفلاتر والترتيب
        // ==========================================
        let currentCategory = "all";

        function filterByCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === getCategoryArabic(category) || (category === 'all' && btn.innerText === 'الكل') || (category === 'Favorites' && btn.innerText === '⭐ المفضلة')) {
                    btn.classList.add('active');
                }
            });
            renderFarms();
        }

        function getCategoryArabic(cat) {
            switch(cat) {
                case 'Mobs': return 'وحوش';
                case 'Crops': return 'زراعة';
                case 'Blocks': return 'بلوكات';
                case 'XP': return 'إكس بي';
                default: return 'الكل';
            }
        }

        // ==========================================
        // 4. عرض البيانات (بدون خطوات بناء)
        // ==========================================
        function renderFarms() {
            const container = document.getElementById("farmsContainer");
            const searchVal = document.getElementById("searchBox").value.toLowerCase();
            const sortVal = document.getElementById("sortBox").value;
            container.innerHTML = "";

            let filteredFarms = farmsData.filter(farm => {
                const matchCategory = currentCategory === "all" || currentCategory === "Favorites" || farm.category === currentCategory;
                const matchSearch = farm.name.toLowerCase().includes(searchVal) || farm.keywords.includes(searchVal);
                const matchFavorite = currentCategory === "Favorites" ? favorites.includes(farm.id) : true;
                return matchCategory && matchSearch && matchFavorite;
            });

            if (sortVal === "rate_desc") {
                filteredFarms.sort((a, b) => {
                    const rateA = parseInt(a.rate.replace(/[^0-9]/g, '')) || 0;
                    const rateB = parseInt(b.rate.replace(/[^0-9]/g, '')) || 0;
                    return rateB - rateA;
                });
            } else if (sortVal === "difficulty_asc") {
                const diffMap = { 'سهل': 1, 'متوسط': 2, 'متقدم': 3 };
                filteredFarms.sort((a, b) => diffMap[a.difficulty] - diffMap[b.difficulty]);
            }

            if(filteredFarms.length === 0) {
                container.innerHTML = "<p style='text-align:center; font-family: Press Start 2P; color: #ff5555; margin-top:50px;'>مفيش فارمات بالاسم ده أو في المفضلة!</p>";
                return;
            }

            filteredFarms.forEach((farm, index) => {
                const card = document.createElement("div");
                card.className = "farm-card";
                
                let resourcesHTML = farm.resources.map((res, resIdx) => `
                    <li id="res-${index}-${resIdx}">
                        <input type="checkbox" onchange="toggleCheck(this, ${index}, ${resIdx})">
                        <span class="res-icon">${res.icon}</span>
                        <span class="res-text">${res.text}</span>
                    </li>
                `).join("");

                let tipsHTML = "";
                if (farm.tips && farm.tips.length > 0) {
                    let tipsList = farm.tips.map(tip => `<li>${tip}</li>`).join("");
                    tipsHTML = `
                        <div class="tips-box">
                            <span class="tips-title">💡 نصائح المحترفين:</span>
                            <ul>${tipsList}</ul>
                        </div>
                    `;
                }

                const isFav = favorites.includes(farm.id);
                const starClass = isFav ? 'active' : 'inactive';
                const starIcon = isFav ? '⭐' : '☆';

                card.innerHTML = `
                    <div class="farm-header" onclick="toggleDetails(${index})">
                        <div class="farm-title-area">
                            <div class="farm-title-row">
                                <div class="farm-title">${farm.name}</div>
                                <button class="fav-star ${starClass}" onclick="event.stopPropagation(); toggleFavorite('${farm.id}')">${starIcon}</button>
                            </div>
                            <div class="badges-area">
                                <span class="badge version-badge">Java ${farm.version}</span>
                                <span class="badge rate-badge">⏱️ ${farm.rate}</span>
                            </div>
                        </div>
                        <div class="farm-difficulty">الصعوبة: ${farm.difficulty}</div>
                    </div>
                    <div class="farm-details" id="details-${index}">
                        <div class="video-actions">
                            <button class="video-btn" onclick="loadVideo(${index}, '${farm.videoId}')">🎬 شاهد الفيديو</button>
                            <a href="https://www.youtube.com/watch?v=${farm.videoId}" target="_blank" class="yt-direct">🔗 فتح على اليوتيوب</a>
                        </div>
                        <div id="video-container-${index}" class="video-container" style="display: none;"></div>
                        ${tipsHTML}
                        <div class="resources-box">
                            <h3>
                                📦 الموارد المطلوبة
                                <button class="copy-btn" onclick="copyResources(${index}, event)">📋 نسخ</button>
                            </h3>
                            <div class="progress-container">
                                <div class="progress-bar" id="progress-${index}"></div>
                            </div>
                            <ul class="resource-list">${resourcesHTML}</ul>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ==========================================
        // 5. التفاعلات
        // ==========================================
        function toggleDetails(index) {
            const details = document.getElementById(`details-${index}`);
            details.style.display = details.style.display === "block" ? "none" : "block";
        }

        function loadVideo(index, videoId) {
            const container = document.getElementById(`video-container-${index}`);
            if (container.style.display === "none" || container.innerHTML === "") {
                container.style.display = "block";
                container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            } else {
                container.style.display = "none";
                container.innerHTML = "";
            }
        }

        function toggleCheck(checkbox, farmIdx, resIdx) {
            const listItem = checkbox.parentElement;
            if (checkbox.checked) {
                listItem.classList.add("checked-item");
            } else {
                listItem.classList.remove("checked-item");
            }
            updateProgress(farmIdx);
        }

        function updateProgress(farmIdx) {
            const farmCard = document.getElementById(`details-${farmIdx}`);
            const totalResources = farmCard.querySelectorAll('.resource-list li').length;
            const checkedResources = farmCard.querySelectorAll('.resource-list li.checked-item').length;
            const progressBar = document.getElementById(`progress-${farmIdx}`);
            
            const percentage = (checkedResources / totalResources) * 100;
            progressBar.style.width = percentage + "%";
            
            if(percentage === 100) {
                progressBar.style.backgroundColor = "#ffeb3b";
            } else {
                progressBar.style.backgroundColor = "#4CAF50";
            }
        }

        function copyResources(farmIdx, event) {
            event.stopPropagation();
            const details = document.getElementById(`details-${farmIdx}`);
            if(details.style.display !== "block") {
                details.style.display = "block";
            }

            const farm = farmsData[farmIdx];
            let textToCopy = `الموارد لـ ${farm.name} (Java ${farm.version}):\n\n`;
            farm.resources.forEach(res => {
                textToCopy += `- ${res.text}\n`;
            });

            const btn = event.target;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showCopySuccess(btn);
                }).catch(() => {
                    fallbackCopyTextToClipboard(textToCopy, btn);
                });
            } else {
                fallbackCopyTextToClipboard(textToCopy, btn);
            }
        }

        function fallbackCopyTextToClipboard(text, btn) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.top = "-1000px";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                showCopySuccess(btn);
            } catch (err) {
                btn.innerText = "فشل";
                setTimeout(() => { btn.innerText = "نسخ"; }, 2000);
            }
            document.body.removeChild(textArea);
        }

        function showCopySuccess(btn) {
            btn.innerText = "تم!";
            setTimeout(() => { btn.innerText = "نسخ"; }, 2000);
        }

        // ==========================================
        // 6. زرار الصعود لأعلى
        // ==========================================
        window.onscroll = function() {
            const btn = document.getElementById("scrollTopBtn");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        };

        function topFunction() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // تشغيل أول تحميل
        renderFarms();
    </script>
